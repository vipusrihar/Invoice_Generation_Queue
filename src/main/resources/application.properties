# =============================================================
#  APPLICATION
# =============================================================
spring.application.name=invoice-worker-queue
server.port=8080

# =============================================================
#  RABBITMQ CONNECTION
# =============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =============================================================
#  QUEUE / EXCHANGE / ROUTING KEY NAMES
#  All queue names are centralised here — never hardcoded in Java
# =============================================================
rabbitmq.queue.invoice=invoice_generation_queue
rabbitmq.queue.dead-letter=invoice_dead_letter_queue
rabbitmq.exchange.invoice=invoice.direct.exchange
rabbitmq.exchange.dead-letter=invoice.dead.letter.exchange
rabbitmq.routing.key.invoice=invoice.generate
rabbitmq.routing.key.dead-letter=invoice.dead

# =============================================================
#  LISTENER BEHAVIOUR
#  prefetch=1  →  Fair Dispatch (only 1 job at a time per worker)
#  acknowledge-mode=manual  →  ack only after job is DONE
#  concurrency=2  →  2 worker threads inside this single app
# =============================================================
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.concurrency=2
spring.rabbitmq.listener.simple.max-concurrency=5
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000

# =============================================================
#  ACTUATOR (health + queue monitoring)
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
